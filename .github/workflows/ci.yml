name: CI

on:
  push:
    branches:
      - '**'

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: commitment-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: commitment-app/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test
